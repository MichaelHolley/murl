# Mounted at /etc/nginx/conf.d/default.conf, so the base image's http{} defaults apply.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  location /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Vite emits content-hashed filenames here, so they are safe to pin forever
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Never cached, so a rebuilt image is picked up on the next load
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
