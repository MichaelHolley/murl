name: Release CLI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # trusted publishing (OIDC) requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - name: Install dependencies
        working-directory: packages/cli-client
        run: bun install

      - name: Build
        working-directory: packages/cli-client
        run: bun build.ts

      - name: Stamp version
        working-directory: packages/cli-client
        run: npm pkg set version=${{ inputs.version }}

      - name: Publish to npm
        working-directory: packages/cli-client
        run: npm publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          files: packages/cli-client/bin/murl
          generate_release_notes: true
